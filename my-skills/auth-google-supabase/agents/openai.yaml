name: auth-google-supabase-agent
version: 1.0.0
description: Agent for Google OAuth login, JWT token management, and Supabase role verification

model:
  provider: openai
  model: gpt-4o-mini
  temperature: 0

tools:
  - name: verify_google_credential
    description: Verify Google OAuth2 credential and return user profile
    type: function
    parameters:
      type: object
      properties:
        credential:
          type: string
          description: Google OAuth credential token
      required:
        - credential

  - name: resolve_user_role
    description: Query Supabase users table to verify admin role
    type: function
    parameters:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

  - name: create_jwt_tokens
    description: Generate access + refresh JWT tokens for authenticated user
    type: function
    parameters:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, recruiter, interviewer]
      required:
        - user_id
        - email
        - role

env_vars:
  required:
    - GOOGLE_CLIENT_ID
    - JWT_SECRET
    - SUPABASE_URL
    - SUPABASE_SERVICE_KEY
